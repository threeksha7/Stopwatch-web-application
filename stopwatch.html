<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stopwatch App</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #121212;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        text-align: center;
        background: #1e1e1e;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
        width: 300px;
    }

    #display {
        font-size: 2.5em;
        margin-bottom: 20px;
    }

    button {
        padding: 10px 15px;
        margin: 5px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1em;
    }

    .start { background: #4CAF50; }
    .pause { background: #f39c12; }
    .reset { background: #e74c3c; }
    .lap { background: #3498db; }

    ul {
        list-style: none;
        padding: 0;
        margin-top: 15px;
        max-height: 150px;
        overflow-y: auto;
    }

    li {
        background: #2c2c2c;
        margin: 5px 0;
        padding: 8px;
        border-radius: 5px;
    }
</style>
</head>

<body>

<div class="container">
    <div id="display">00:00:00.000</div>

    <button class="start" onclick="start()">Start</button>
    <button class="pause" onclick="pause()">Pause</button>
    <button class="reset" onclick="reset()">Reset</button>
    <button class="lap" onclick="lap()">Lap</button>

    <ul id="laps"></ul>
</div>

<script>
let startTime = 0;
let elapsedTime = 0;
let timerInterval;

function formatTime(ms) {
    let milliseconds = ms % 1000;
    let seconds = Math.floor(ms / 1000) % 60;
    let minutes = Math.floor(ms / (1000 * 60)) % 60;
    let hours = Math.floor(ms / (1000 * 60 * 60));

    return (
        String(hours).padStart(2, '0') + ":" +
        String(minutes).padStart(2, '0') + ":" +
        String(seconds).padStart(2, '0') + "." +
        String(milliseconds).padStart(3, '0')
    );
}

function updateDisplay() {
    document.getElementById("display").innerText = formatTime(elapsedTime);
}

function start() {
    if (!timerInterval) {
        startTime = Date.now() - elapsedTime;
        timerInterval = setInterval(() => {
            elapsedTime = Date.now() - startTime;
            updateDisplay();
        }, 10);
    }
}

function pause() {
    clearInterval(timerInterval);
    timerInterval = null;
}

function reset() {
    clearInterval(timerInterval);
    timerInterval = null;
    elapsedTime = 0;
    updateDisplay();
    document.getElementById("laps").innerHTML = "";
}

function lap() {
    if (elapsedTime === 0) return;

    let lapTime = formatTime(elapsedTime);
    let li = document.createElement("li");
    li.textContent = "Lap: " + lapTime;
    document.getElementById("laps").appendChild(li);
}
</script>

</body>
</html>
